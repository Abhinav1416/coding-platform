name: Sentinel CI

on:
  push:
    branches: [ "feature/sentinel-service" ]
    paths:
      - 'sentinel/**'
      - '.github/workflows/sentinel-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sentinel

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      localstack:
        image: localstack/localstack:3.8.0
        env:
          SERVICES: s3,sqs,lambda,iam,logs
          AWS_DEFAULT_REGION: ap-southeast-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        ports:
          - 4566:4566

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        env:
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_CLOUD_AWS_SQS_ENDPOINT: http://localhost:4566
          SPRING_CLOUD_AWS_REGION_STATIC: ap-southeast-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        run: ./gradlew test --no-daemon

      - name: Verify Docker Build (Dry Run)
        run: docker build -t codeduels-sentinel:test .