spring.application.name=sentinel-service
server.port=8081

# 1. Use environment variables injected by AWS, fallback to localhost for dev
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# 2. Set to your actual AWS Region (was ap-southeast-1, changing to ap-south-1)
spring.cloud.aws.region.static=ap-south-1

# NOTE: We completely deleted spring.cloud.aws.credentials and the sqs.endpoint!
# Without them, the AWS SDK will automatically use your ECS Task Role
# to securely connect to the real AWS SQS queues.

resilience4j.circuitbreaker.instances.codeforces-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.codeforces-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.codeforces-api.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.codeforces-api.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.codeforces-api.minimum-number-of-calls=5

logging.level.com.codingplatform.sentinel=DEBUG
logging.level.io.awspring.cloud.sqs=INFO
logging.level.org.springframework.messaging=INFO

spring.threads.virtual.enabled=true