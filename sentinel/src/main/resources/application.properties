# ===============================
# CORE CONFIGURATION
# ===============================
spring.application.name=sentinel-service
server.port=8081

# ===============================
# REDIS (DEDICATED INSTANCE)
# ===============================
# Connects to the sentinel_redis container on port 6380
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.data.redis.timeout=2000ms

# ===============================
# AWS / LOCALSTACK CONFIGURATION
# ===============================
spring.cloud.aws.region.static=ap-southeast-1
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test

# Point SQS to LocalStack
spring.cloud.aws.sqs.endpoint=http://localhost:4566

# ===============================
# RESILIENCE4J (SMART THROTTLER)
# ===============================
# Circuit Breaker named "codeforces-api"
resilience4j.circuitbreaker.instances.codeforces-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.codeforces-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.codeforces-api.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.codeforces-api.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.codeforces-api.minimum-number-of-calls=5

# ===============================
# LOGGING
# ===============================
logging.level.com.codingplatform.sentinel=DEBUG